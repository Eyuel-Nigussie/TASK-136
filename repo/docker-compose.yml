# CourierMatch iOS -- Docker Compose
#
# Platform-independent (Linux):
#   docker compose run build
#   docker compose run test
#
# macOS-only (requires ./scripts/docker-setup.sh first):
#   docker compose run run-mac
#   docker compose run test-mac

services:
  couriermatch:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  build:
    extends:
      service: couriermatch
    command: build

  test:
    extends:
      service: couriermatch
    command: test

  run-mac:
    extends:
      service: couriermatch
    command: run-mac

  test-mac:
    extends:
      service: couriermatch
    command: test-mac
